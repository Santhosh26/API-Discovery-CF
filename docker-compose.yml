services:
  api:
    build: .
    ports:
      - "3001:3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  traffic-gen:
    build: .
    command: ["node", "scripts/traffic-generator.js"]
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      - API_BASE_URL=https://demo-api.ksanthoshkumar.com
      - BATCH_SIZE=100
      - INTERVAL_HOURS=4
